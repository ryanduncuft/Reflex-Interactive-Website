<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Indie Video Games Catalog | Reflex Interactive</title>

    <meta name="description" content="Browse the official Reflex Interactive game catalog. From narrative-driven action to competitive systems, explore our library of high-polish indie titles and upcoming releases.">
    <link rel="canonical" href="https://www.reflexinteractive.com/games">
    
    <meta property="og:title" content="Our Games | Reflex Interactive Catalog">
    <meta property="og:description" content="Discover action-packed indie games and immersive experiences from Reflex Interactive. Explore trailers, screenshots, and more.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.reflexinteractive.com/games">
    <meta property="og:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Reflex Interactive | Game Catalog">
    <meta name="twitter:description" content="Explore the full library of immersive indie titles from Reflex Interactive.">

    <link rel="icon" href="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_Logo_no_back_srtf76.ico">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    
    <script type="application/ld+json" id="games-schema">
    {
      "@context": "https://schema.org",
      "@type": "CollectionPage",
      "name": "Reflex Interactive Games Catalog",
      "description": "The complete library of video games developed by Reflex Interactive, including narrative action and competitive titles.",
      "url": "https://www.reflexinteractive.com/games",
      "mainEntity": {
        "@type": "ItemList",
        "itemListElement": [], 
        "numberOfItems": "0" 
      }
    }
    </script>
</head>
<body class="bg-black text-white overflow-x-hidden">
    
    <div id="navbar-placeholder"></div>
    <div id="search-placeholder"></div>

    <main class="pt-4 pt-md-5" role="main">
        <section id="games-catalog" class="py-5 page-hero" role="region" aria-labelledby="games-heading">
            <div class="container">
                <div class="mb-5 text-center">
                    <h1 id="games-heading" class="display-3 fw-bold text-center mb-3 text-uppercase reveal-on-load">
                        Our <span class="text-danger">Games</span>
                    </h1>
                    <p class="fs-5 text-muted reveal-on-scroll content-max">
                        Discover our collection of immersive and action-packed gaming experiences
                    </p>
                </div>
                
                <div id="games-loading-spinner" class="d-flex justify-content-center align-items-center" style="min-height: 12rem;" aria-label="Loading our full game catalog.">
                    <div class="loading-animation"></div>
                </div>
                
                <div id="full-games-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
