<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Newswire | Reflex Interactive</title>

    <meta name="description" id="news-meta-description" content="Read the official Reflex Interactive Newswire for studio announcements, game updates, patch notes, development blogs, and release news.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="author" content="Reflex Interactive">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">
    <link rel="canonical" href="https://reflexinteractive.com/newswire">
    
    <meta property="og:title" id="og-title" content="Newswire | Reflex Interactive">
    <meta property="og:description" id="og-description" content="Studio news, release updates, patch notes, and development stories from Reflex Interactive.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://reflexinteractive.com/newswire">
    <meta property="og:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_512px_ovsgi1.jpg">
    <meta property="og:site_name" content="Reflex Interactive">
    <meta property="og:locale" content="en_GB">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@MadeByReflex">
    <meta name="twitter:title" content="Newswire | Reflex Interactive">
    <meta name="twitter:description" content="Read Reflex Interactive studio news, game updates, patch notes, and development blogs.">
    <meta name="twitter:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_512px_ovsgi1.jpg">

    <link rel="icon" href="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_Logo_no_back_srtf76.ico">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">
    
    <script type="application/ld+json" id="news-schema">
    {
        "@context": "https://schema.org",
        "@type": "Blog",
        "name": "Reflex Interactive Newswire",
        "url": "https://reflexinteractive.com/newswire",
        "description": "Studio announcements, development blogs, game updates, patch notes, and release news from Reflex Interactive.",
        "publisher": {
            "@type": "Organization",
            "name": "Reflex Interactive"
        }
    }
    </script>
</head>

<body class="bg-black text-white overflow-x-hidden">
    
    <div id="navbar"></div>

    <main id="main-content" class="min-vh-100 pt-4 pt-md-5" role="main">
        <section class="container py-5 page-hero" role="region" aria-labelledby="news-heading">
            <div class="page-intro text-center mx-auto mb-5">
                <p class="section-kicker mb-3 reveal-on-load">Newswire</p>
                <h1 id="news-heading" class="display-3 fw-bold text-uppercase reveal-on-load">
                    Latest <span class="text-danger">News</span>
                </h1>
                <p class="fs-5 text-muted reveal-on-scroll mb-0">
                    Studio updates, release notes, development logs, and announcements from Reflex Interactive.
                </p>
            </div>

            <div id="loading-spinner" class="loading-zone d-flex justify-content-center align-items-center" role="status" aria-live="polite" aria-label="Loading news articles. Please wait.">
                <div class="loading-animation"></div>
            </div>

            <div id="news-container" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-5"></div>
        </section>
    </main>
    
    <div id="footer"></div>
    
    <script src="./js/app.js" defer></script>
</body>
</html>
