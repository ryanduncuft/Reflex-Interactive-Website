<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title id="game-title">Game Details | Reflex Interactive</title>

    <meta name="robots" content="index, follow, max-image-preview:large">
    <meta name="author" content="Reflex Interactive">
    <meta name="theme-color" content="#000000">
    <meta name="format-detection" content="telephone=no">
    <meta name="description" id="game-meta-description" content="Explore a Reflex Interactive game with official details, screenshots, trailers, pricing, downloads, and purchase options.">
    <link rel="canonical" id="canonical-url" href="https://reflexinteractive.com/game-details">

    <meta property="og:title" id="og-title" content="Game Details | Reflex Interactive">
    <meta property="og:description" id="og-description" content="Explore official screenshots, media, downloads, pricing, and details for a Reflex Interactive game.">
    <meta property="og:type" content="video.game">
    <meta property="og:url" content="https://reflexinteractive.com/game-details">
    <meta property="og:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png">
    <meta property="og:site_name" content="Reflex Interactive">
    <meta property="og:locale" content="en_GB">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@MadeByReflex">
    <meta name="twitter:title" content="Game Details | Reflex Interactive">
    <meta name="twitter:description" content="Explore official screenshots, media, downloads, pricing, and details for a Reflex Interactive game.">
    <meta name="twitter:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png">

    <link rel="icon" href="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_Logo_no_back_srtf76.ico">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&amp;family=Space+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/styles.css">

    <script type="application/ld+json" id="game-json-ld">
    {
      "@context": "https://schema.org",
      "@type": "VideoGame",
      "applicationCategory": "Game",
      "operatingSystem": "Windows, Console",
      "publisher": {
        "@type": "Organization",
        "name": "Reflex Interactive"
      },
      "author": {
        "@type": "Organization",
        "name": "Reflex Interactive"
      }
    }
    </script>
</head>
<body class="bg-black text-white overflow-x-hidden">
    
    <div id="navbar"></div>

    <main id="main-content" class="pt-4 pt-md-5 details-page" role="main">
        <section id="game-hero" class="game-details-hero" role="banner">
            <div class="hero-overlay"></div>
            <div class="position-relative z-3 container d-flex align-items-end pb-5 game-hero-content">
                <div>
                    <p class="section-kicker text-danger mb-3 reveal-on-load">Game Details</p>
                    <h1 id="game-detail-title" class="display-1 fw-black text-uppercase text-shadow-lg reveal-on-load mb-0"></h1>
                </div>
            </div>
        </section>

        <section id="game-details" class="py-5" role="region" aria-labelledby="game-detail-title">
            <div class="container">
                <div class="row g-5 align-items-start">
                    
                    <aside class="col-12 col-lg-3 reveal-on-scroll">
                        <div class="detail-sidebar">
                            <img id="game-detail-cover" src="#" alt="Game Cover Art" class="img-fluid rounded-xl shadow-lg mb-4">
                            <div class="surface-panel p-4">
                            <div class="mb-4">
                                <h3 class="text-uppercase text-muted fw-bold small mb-2">Price</h3>
                                <p id="game-detail-price" class="text-danger fs-4 fw-bold mb-0"></p>
                            </div>
                            <a id="purchase-download-btn" href="#" class="btn btn-danger w-100 py-3 fw-bold text-uppercase" aria-label="Purchase or download the game">
                                Purchase Now
                            </a>
                            </div>
                        </div>
                    </aside>

                    <div class="col-12 col-lg-9">
                        
                        <article class="surface-panel p-4 p-md-5 mb-5 reveal-on-scroll" aria-labelledby="details-heading">
                            <h2 id="details-heading" class="h4 fw-bold mb-4 text-uppercase text-white">Game Details</h2>
                            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                                <div class="col">
                                    <h3 class="text-muted text-uppercase small fw-bold mb-2">Developer</h3>
                                    <p id="game-detail-developer" class="text-white fw-bold mb-0"></p>
                                </div>
                                <div class="col">
                                    <h3 class="text-muted text-uppercase small fw-bold mb-2">Publisher</h3>
                                    <p id="game-detail-publisher" class="text-white fw-bold mb-0"></p>
                                </div>
                                <div class="col">
                                    <h3 class="text-muted text-uppercase small fw-bold mb-2">Genre</h3>
                                    <p id="game-detail-genre" class="text-white fw-bold mb-0"></p>
                                </div>
                            </div>
                        </article>

                        <article class="surface-panel p-4 p-md-5 mb-5 reveal-on-scroll" aria-labelledby="description-heading">
                            <h2 id="description-heading" class="h3 fw-bold mb-4 text-uppercase text-white">About This Game</h2>
                            <p id="game-detail-description" class="text-light lh-lg fs-5"></p>
                        </article>

                        <article class="reveal-on-scroll" aria-labelledby="media-heading">
                            <h2 id="media-heading" class="h3 fw-bold mb-4 text-uppercase text-white">Media</h2>
                            <div id="game-detail-screenshots" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4"></div>
                        </article>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="footer"></div>
    
    <script src="./js/app.js" defer></script>
</body>
</html>
