<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Support | Reflex Interactive</title>

    <meta name="description" content="Get official Reflex Interactive support for games, account questions, technical issues, bug reports, downloads, and studio contact requests.">
    <meta name="robots" content="index, follow, max-image-preview:large">
    <link rel="canonical" href="https://support.reflexinteractive.com/">
    
    <meta property="og:title" content="Support | Reflex Interactive">
    <meta property="og:description" content="Official support for Reflex Interactive games, accounts, technical issues, bug reports, and studio contact requests.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://support.reflexinteractive.com/">
    <meta property="og:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png">
    <meta property="og:site_name" content="Reflex Interactive">
    <meta property="og:locale" content="en_GB">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:site" content="@MadeByReflex">
    <meta name="twitter:title" content="Support | Reflex Interactive">
    <meta name="twitter:description" content="Get official Reflex Interactive support for games, accounts, technical issues, and bug reports.">
    <meta name="twitter:image" content="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_Logo_no_back_srtf76.ico">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Reflex Interactive Support",
      "description": "Official support and contact page for Reflex Interactive games, accounts, technical issues, and bug reports.",
      "url": "https://support.reflexinteractive.com/",
      "mainEntity": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://support.reflexinteractive.com/",
        "email": "support@reflexinteractive.com"
      }
    }
    </script>
</head>
<body class="bg-black text-white">
    
    <div id="navbar"></div>

    <main class="min-vh-100">
        <section class="support-hero py-5 text-center bg-dark mb-5">
            <div class="container py-5">
                <h1 class="display-4 fw-bold text-uppercase reveal-on-load">How can we <span class="text-danger">Help?</span></h1>
            </div>
        </section>

        <div class="container pb-5">
            <h2 class="h4 text-uppercase fw-bold mb-4 border-bottom border-danger pb-2">Select a Game</h2>
            <div id="support-game-grid" class="row row-cols-1 row-cols-md-3 g-4 mb-5">
                <div class="col text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                </div>
            </div>

            <h2 class="h4 text-uppercase fw-bold mb-4 border-bottom border-secondary pb-2">Other Categories</h2>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3 mb-5">
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-user-shield fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Account Support</h5>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-tools fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Technical Issues</h5>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-bug fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Submit a Bug</h5>
                        </div>
                    </a>
                </div>
            </div>

            <section id="contact-section" class="pt-5 mt-5 border-top border-secondary">
                <div class="row justify-content-center">
                    <div class="col-lg-8 text-center">
                        <h3 class="fw-bold text-uppercase">Still need help?</h3>
                        <p class="text-muted mb-5">Send us a detailed ticket and we will get back to you.</p>
                        
                        <div class="mb-5 reveal-on-scroll">
                            <h2 class="h3 fw-bold mb-3 text-danger">Contact Our Support Team</h2>
                            <p class="mt-2">Email: <a class="text-danger text-decoration-none" href="mailto:support@reflexinteractive.com">support@reflexinteractive.com</a></p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <div id="footer"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
