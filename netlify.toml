# === 1. Domain Normalization ===
# Redirect WWW and Netlify subdomain to Naked Domain
[[redirects]]
  from = "https://www.reflexinteractive.com/*"
  to = "https://reflexinteractive.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://reflexinteractive.netlify.app/*"
  to = "https://reflexinteractive.com/:splat"
  status = 301
  force = true

# === 2. Subdomain Logic ===
# SUPPORT SUBDOMAIN
# Serve shared static assets directly on app subdomains to avoid dev/prod surprises.
[[redirects]]
  from = "https://support.reflexinteractive.com/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "https://support.reflexinteractive.com/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "https://support.reflexinteractive.com/components/*"
  to = "/components/:splat"
  status = 200

[[redirects]]
  from = "https://careers.reflexinteractive.com/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "https://careers.reflexinteractive.com/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "https://careers.reflexinteractive.com/components/*"
  to = "/components/:splat"
  status = 200

[[redirects]]
  from = "https://account.reflexinteractive.com/css/*"
  to = "/css/:splat"
  status = 200

[[redirects]]
  from = "https://account.reflexinteractive.com/js/*"
  to = "/js/:splat"
  status = 200

[[redirects]]
  from = "https://account.reflexinteractive.com/components/*"
  to = "/components/:splat"
  status = 200

# 1. Serve support.html at the root of the support subdomain
[[redirects]]
  from = "https://support.reflexinteractive.com/"
  to = "/support.html"
  status = 200
  force = true

# 2. If a user clicks a link like "/games" while on the support subdomain, force them back to the main domain
[[redirects]]
  from = "https://support.reflexinteractive.com/*"
  to = "https://reflexinteractive.com/:splat"
  status = 301
  force = true

# CAREERS SUBDOMAIN
[[redirects]]
  from = "https://careers.reflexinteractive.com/"
  to = "/careers.html"
  status = 200
  force = true

# ACCOUNT SUBDOMAIN
[[redirects]]
  from = "https://account.reflexinteractive.com/"
  to = "/account.html"
  status = 200
  force = true

[[redirects]]
  from = "https://careers.reflexinteractive.com/*"
  to = "https://reflexinteractive.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://account.reflexinteractive.com/*"
  to = "https://reflexinteractive.com/:splat"
  status = 301
  force = true

# === 3. Main Domain to Subdomain Redirects ===
# When users click /support, /careers, or /account on the main site, send them to the subdomains
[[redirects]]
  from = "/support"
  to = "https://support.reflexinteractive.com/"
  status = 301
  force = true

[[redirects]]
  from = "/careers"
  to = "https://careers.reflexinteractive.com/"
  status = 301
  force = true

[[redirects]]
  from = "/account"
  to = "https://account.reflexinteractive.com/"
  status = 301
  force = true

# === 4. Clean URLs & Routing ===
[[redirects]]
  from = "/games"
  query = {id = ":id"}
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/game-details"
  query = {id = ":id"}
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  query = {id = ":id"}
  to = "/newswire-details?id=:id"
  status = 301

[[redirects]]
  from = "/newswire-details"
  query = {id = ":id"}
  to = "/newswire-details.html"
  status = 200

[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200

[[redirects]]
  from = "/game-details"
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/newswire-details"
  to = "/newswire-details.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

# === 5. Fallbacks & Headers ===
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
  for = "/components/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
