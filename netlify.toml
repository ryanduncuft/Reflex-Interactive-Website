# === 1. Domain Normalization ===
[[redirects]]
  from = "https://reflexinteractive.netlify.app/*"
  to = "https://www.reflexinteractive.com/:splat"
  status = 301
  force = true

# === 2. Subdomain & Support Logic ===
# Explicitly map the root of the support domain to contact.html
# (We check both with and without the trailing slash to be safe)
[[redirects]]
  from = "https://support.reflexinteractive.com/"
  to = "/contact.html"
  status = 200
  force = true

[[redirects]]
  from = "https://support.reflexinteractive.com"
  to = "/contact.html"
  status = 200
  force = true

[[redirects]]
  from = "https://careers.reflexinteractive.com/*"
  to = "/careers.html"
  status = 200
  force = true

[[redirects]]
  from = "https://account.reflexinteractive.com/*"
  to = "/account.html"
  status = 200
  force = true
  
# === 3. Clean URLs & Routing ===
[[redirects]]
  from = "/games"
  query = {id = ":id"}
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  query = {id = ":id"}
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200

[[redirects]]
  from = "/newswire"
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "https://support.reflexinteractive.com/"
  status = 301
  force = true

# === 4. Fallbacks ===
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"