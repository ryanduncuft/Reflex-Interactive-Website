# === 1. Subdomain & Domain Logic ===
# This handles your support page first so it doesn't get caught in the main redirect
[[redirects]]
  from = "https://support.reflexinteractive.com/*"
  to = "/contact.html"
  status = 200
  force = true

# Redirects the default netlify.app URL to your custom domain
[[redirects]]
  from = "https://reflexinteractive.netlify.app/*"
  to = "https://www.reflexinteractive.com/:splat"
  status = 301
  force = true

# === 2. Query Parameter Rewrites ===
# Handles dynamic IDs for Games and Newswire
[[redirects]]
  from = "/games"
  query = { id = ":id" }
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  query = { id = ":id" }
  to = "/newswire.html"
  status = 200

# === 3. Static Clean URLs ===
# Removes the need for .html in the browser bar
[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200

[[redirects]]
  from = "/newswire"
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "/tos"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# === 4. External Redirects ===
[[redirects]]
  from = "/launcher"
  to = "https://cdn.reflexinteractive.com/launcher-files/win-x64/launcher-latest.zip"
  status = 302

# === 5. Global Fallback ===
# Must remain at the very bottom
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404