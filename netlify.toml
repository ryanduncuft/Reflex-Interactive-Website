# === 1. Subdomain & Domain Logic ===

# A: ROOT of subdomain -> show contact page
[[redirects]]
  from = "https://support.reflexinteractive.com/"
  to = "/contact.html"
  status = 200
  force = true

# B: If on support subdomain but trying to go to other pages, redirect to main site
# This prevents support.reflexinteractive.com/about from existing
[[redirects]]
  from = "https://support.reflexinteractive.com/about"
  to = "https://www.reflexinteractive.com/about"
  status = 301
  force = true

[[redirects]]
  from = "https://support.reflexinteractive.com/games"
  to = "https://www.reflexinteractive.com/games"
  status = 301
  force = true

[[redirects]]
  from = "https://support.reflexinteractive.com/newswire"
  to = "https://www.reflexinteractive.com/newswire"
  status = 301
  force = true

# C: Allow assets (CSS/JS) to load on the subdomain
[[redirects]]
  from = "https://support.reflexinteractive.com/*"
  to = "/:splat"
  status = 200

# D: Normalization
[[redirects]]
  from = "https://reflexinteractive.netlify.app/*"
  to = "https://www.reflexinteractive.com/:splat"
  status = 301
  force = true

# === 2. Query Parameter Rewrites ===
# Handles dynamic IDs for Games and Newswire
[[redirects]]
  from = "/games"
  query = { id = ":id" }
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  query = { id = ":id" }
  to = "/newswire.html"
  status = 200

# === 3. Static Clean URLs ===
# Removes the need for .html in the browser bar
[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200

[[redirects]]
  from = "/newswire"
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "https://support.reflexinteractive.com/"
  status = 301
  force = true

[[redirects]]
  from = "/tos"
  to = "/tos.html"
  status = 200

[[redirects]]
  from = "/privacy"
  to = "/privacy.html"
  status = 200

# === 4. External Redirects ===
[[redirects]]
  from = "/launcher"
  to = "https://cdn.reflexinteractive.com/launcher-files/win-x64/launcher-latest.zip"
  status = 302

# === 5. Global Fallback ===
# Must remain at the very bottom
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/components/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"