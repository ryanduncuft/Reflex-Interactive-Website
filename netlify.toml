# === 1. Domain Normalization ===
# We let the Netlify Dashboard handle the WWW/Naked swap.
# This rule only handles the .netlify.app internal URL.
[[redirects]]
  from = "https://reflexinteractive.netlify.app/*"
  to = "https://www.reflexinteractive.com/:splat"
  status = 301
  force = true

# === 2. Subdomain & Support Logic ===
[[redirects]]
  from = "https://support.reflexinteractive.com/"
  to = "/contact.html"
  status = 200

[[redirects]]
  from = "https://support.reflexinteractive.com/*"
  to = "/:splat"
  status = 200

# === 3. Clean URLs & Routing ===
[[redirects]]
  from = "/games"
  query = {id = ":id"}
  to = "/game-details.html"
  status = 200

[[redirects]]
  from = "/newswire"
  query = {id = ":id"}
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/games"
  to = "/games.html"
  status = 200

[[redirects]]
  from = "/newswire"
  to = "/newswire.html"
  status = 200

[[redirects]]
  from = "/about"
  to = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to = "https://support.reflexinteractive.com/"
  status = 301

# === 4. Fallbacks ===
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"