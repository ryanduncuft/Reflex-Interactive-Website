<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Support & Contact | Reflex Interactive</title>

    <meta name="description" content="Get help with Reflex Interactive games. Submit bug reports, find technical support articles, or contact our team for account and billing inquiries.">
    <link rel="canonical" href="https://support.reflexinteractive.com/">
    
    <meta property="og:title" content="Reflex Interactive Support Center">
    <meta property="og:description" content="How can we help? Search for game guides, technical fixes, or submit a support ticket.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://support.reflexinteractive.com/">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532761/Reflex_Interactive_Logo_no_back_srtf76.ico">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ContactPage",
      "name": "Reflex Interactive Support",
      "description": "Official support and contact page for Reflex Interactive indie game studio.",
      "url": "https://support.reflexinteractive.com/",
      "mainEntity": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "url": "https://support.reflexinteractive.com/",
        "email": "support@reflexinteractive.com"
      }
    }
    </script>
</head>
<body class="bg-black text-white">
    
    <div id="navbar-placeholder"></div>

    <main class="min-vh-100">
        <section class="py-5 text-center bg-dark mb-5" style="background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://res.cloudinary.com/dvju1xiaw/image/upload/q_auto/f_auto/v1778532765/Reflex_Interactive_f3zylo.png'); background-size: cover; background-position: center;">
            <div class="container py-5">
                <h1 class="display-4 fw-bold text-uppercase reveal-on-load">How can we <span class="text-danger">Help?</span></h1>
                <p class="text-muted mb-4">Search for games, technical issues, or account help.</p>
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <input type="text" id="global-search-input" class="form-control form-control-lg bg-black text-white border-danger" placeholder="Search support articles...">
                        <div id="search-results-container" class="mt-2 text-start" style="display:none;">
                            <div id="global-search-results" class="list-group"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div class="container pb-5">
            <h2 class="h4 text-uppercase fw-bold mb-4 border-bottom border-danger pb-2">Select a Game</h2>
            <div id="support-game-grid" class="row row-cols-1 row-cols-md-3 g-4 mb-5">
                <div class="col text-center py-5">
                    <div class="spinner-border text-danger" role="status"></div>
                </div>
            </div>

            <h2 class="h4 text-uppercase fw-bold mb-4 border-bottom border-secondary pb-2">Other Categories</h2>
            <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-3 mb-5">
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-user-shield fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Account Support</h5>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-tools fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Technical Issues</h5>
                        </div>
                    </a>
                </div>
                <div class="col">
                    <a href="#contact-section" class="card bg-dark text-white border-secondary h-100 text-decoration-none support-tile">
                        <div class="card-body text-center py-4">
                            <i class="fas fa-bug fa-2x text-danger mb-3"></i>
                            <h5 class="card-title mb-0">Submit a Bug</h5>
                        </div>
                    </a>
                </div>
            </div>

            <section id="contact-section" class="pt-5 mt-5 border-top border-secondary">
                <div class="row justify-content-center">
                    <div class="col-lg-8 text-center">
                        <h3 class="fw-bold text-uppercase">Still need help?</h3>
                        <p class="text-muted mb-5">Send us a detailed ticket and we will get back to you.</p>
                        
                        <form id="contact-form" action="https://formspree.io/f/mnjwyzov" method="POST" class="text-start">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted small text-uppercase">Name</label>
                                    <input type="text" name="name" required class="form-control bg-dark border-secondary text-white">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-muted small text-uppercase">Email</label>
                                    <input type="email" name="_replyto" required class="form-control bg-dark border-secondary text-white">
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase">Issue Category</label>
                                <select name="category" class="form-select bg-dark border-secondary text-white">
                                    <option>Technical Issue</option>
                                    <option>Account Inquiry</option>
                                    <option>Billing</option>
                                    <option>Game Feedback</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small text-uppercase">Message</label>
                                <textarea name="message" required rows="5" class="form-control bg-dark border-secondary text-white"></textarea>
                            </div>
                            <button type="submit" class="btn btn-danger w-100 fw-bold text-uppercase">Submit Ticket</button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </main>
    
    <div id="footer-placeholder"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
